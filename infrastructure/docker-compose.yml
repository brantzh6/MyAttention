version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ike-postgres
    environment:
      POSTGRES_USER: ike
      POSTGRES_PASSWORD: ike
      POSTGRES_DB: ike
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ike"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ike-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ike-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: ike-api
    environment:
      DATABASE_URL: postgresql+asyncpg://ike:ike@postgres:5432/ike
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ../services/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
    container_name: ike-web
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../services/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: ike-network
