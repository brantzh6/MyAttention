# Copy this file to prod.local.toml and adjust for the production machine.

[setup]
migrate_command = "{python} -m alembic upgrade head"

[postgres]
use_service = true
service_name = "IKEProdPostgres"
log_path = "D:/envs/IKE/prod/.runtime/logs/postgres.log"
start_command = "pg_ctl -D D:/envs/IKE/prod/data/postgres -l D:/envs/IKE/prod/.runtime/logs/postgres.log start"
stop_command = "pg_ctl -D D:/envs/IKE/prod/data/postgres -m fast stop"

[redis]
use_service = true
service_name = "IKEProdRedis"
log_path = "D:/envs/IKE/prod/.runtime/logs/redis.log"
start_command = "redis-server.exe --service-run IKEProdRedis"
stop_command = "taskkill /FI \"SERVICES eq IKEProdRedis\" /F"

[qdrant]
mode = "embedded"

[api]
use_service = true
service_name = "IKEProdApi"
log_path = "D:/envs/IKE/prod/.runtime/logs/api-service.log"
command = "{python} run_service.py --host {api_host} --port {api_port}"

[web]
use_service = true
service_name = "IKEProdWeb"
log_path = "D:/envs/IKE/prod/.runtime/logs/web-service.log"
command = "node .next/standalone/server.js"

[watchdog]
auto_start = true
interval_seconds = 20
manage_infra = false
manage_api = true
manage_web = true
use_service = true
service_name = "IKEProdWatchdog"
log_path = "D:/envs/IKE/prod/.runtime/logs/watchdog-service.log"
